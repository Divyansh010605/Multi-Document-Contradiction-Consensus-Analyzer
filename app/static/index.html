<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyzer | Multi-Document Contradiction & Consensus</title>
    
    <!-- SEO & Meta -->
    <meta name="description" content="Advanced AI tool for analyzing contradictions and consensus across multiple documents. Extract insights and verify claims automatically.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Styles -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>InsightStream</h1>
            <p class="subtitle">Intelligent Cross-Document Analysis for Contradiction Discovery and Consensus Mapping.</p>
        </header>

        <main>
            <!-- Input Section -->
            <section class="panel">
                <div class="panel-title">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="12" y1="18" x2="12" y2="12"></line><line x1="9" y1="15" x2="15" y2="15"></line></svg>
                    Document Corpus
                </div>
                
                <div class="toolbar">
                    <button id="addDoc" class="btn-secondary">Add Document</button>
                    <button id="uploadDocsBtn" class="btn-secondary">Upload Files</button>
                    <button id="resetDocsBtn" class="btn-secondary">Reset Sample</button>
                    <button id="analyzeBtn" class="btn-primary">Run Analysis</button>
                </div>

                <div id="dropzone" class="dropzone">
                    <!-- Icon and text injected via JS -->
                </div>
                
                <input id="uploadDocsInput" type="file" multiple style="display:none;" 
                       accept=".txt,.md,.json,.pdf,.docx,text/plain,application/json,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document">
                
                <div id="docs">
                    <!-- Document cards injected via JS -->
                </div>

                <div id="error" style="display:none;"></div>
            </section>

            <!-- Results Section -->
            <section class="panel">
                <div class="panel-title">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                    Analysis Results
                </div>

                <div id="stats" class="stats-grid">
                    <!-- Stats cards injected via JS -->
                </div>

                <div id="relationsSummary" class="relation-summary">
                    <!-- Summary badges injected via JS -->
                </div>

                <div id="claims" class="claims-grid">
                    <!-- Claim cards injected via JS -->
                    <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-muted);">
                        <p>Analysis results will appear here after processing your documents.</p>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p style="text-align: center; color: var(--text-muted); font-size: 0.8rem; margin-top: 40px;">
                Powered by Advanced NLP Pipeline & InsightStream Engine
            </p>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="/static/js/app.js"></script>
</body>
</html>
